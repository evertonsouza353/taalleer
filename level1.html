<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Quiz Level 1</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1b2330;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .quiz-box {
    background: #2c3547;
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
  }

  .word-list {
    margin-top: 20px;
    text-align: left;
    background: #3d475c;
    padding: 15px;
    border-radius: 12px;
  }

  .word {
    padding: 6px 0;
    font-size: 18px;
    cursor: pointer;
  }

  .word:hover {
    color: #ffd76a;
  }

  button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ffd76a;
    color: #3d2a00;
    font-weight: bold;
    cursor: pointer;
  }

  .correct { color: #00ff00; }
  .wrong { color: #ff5555; }
</style>
</head>
<body>

<div class="quiz-box">
  <h2 id="question">Vraag komt hier...</h2>
  <div class="word-list" id="wordList"></div>
  <button onclick="nextQuestion()">Volgende</button>
</div>

<script>
// 🌟 Pak het thema uit de URL
const params = new URLSearchParams(window.location.search);
const thema = params.get("thema") || "weer"; // standaard "weer"

// 🌟 Vragen per thema
const questionBank = {
  weer: [
    { q: "Hoe zeg je 'zon' in het Spaans?", a: ["sol", "lluvia", "nieve", "viento"], correct: 0 },
    { q: "Hoe zeg je 'regen' in het Spaans?", a: ["nieve", "lluvia", "nube", "tormenta"], correct: 1 },
    { q: "Hoe zeg je 'sneeuw' in het Spaans?", a: ["nieve", "sol", "viento", "nube"], correct: 0 }
  ],
  dieren: [
    { q: "Hoe zeg je 'hond' in het Spaans?", a: ["perro", "gato", "caballo", "pájaro"], correct: 0 },
    { q: "Hoe zeg je 'kat' in het Spaans?", a: ["gato", "perro", "oveja", "conejo"], correct: 0 },
    { q: "Hoe zeg je 'paard' in het Spaans?", a: ["caballo", "vaca", "cerdo", "gato"], correct: 0 }
  ],
  kleding: [
    { q: "Hoe zeg je 'shirt' in het Spaans?", a: ["camisa", "pantalón", "zapato", "sombrero"], correct: 0 },
    { q: "Hoe zeg je 'broek' in het Spaans?", a: ["pantalón", "camisa", "chaqueta", "sombrero"], correct: 0 },
    { q: "Hoe zeg je 'hoed' in het Spaans?", a: ["sombrero", "camisa", "pantalón", "zapato"], correct: 0 }
  ]
};

// 🌟 Kies juiste vragenlijst
let questions = questionBank[thema];
let index = 0;

// 🌟 Laad vraag
function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").textContent = q.q;

  const list = document.getElementById("wordList");
  list.innerHTML = "";

  q.a.forEach((word, i) => {
    const div = document.createElement("div");
    div.className = "word";
    div.textContent = `${["A","B","C","D"][i]}: ${word}`;
    div.onclick = () => choose(i);
    list.appendChild(div);
  });
}

// 🌟 Check antwoord
function choose(answerIndex) {
  const q = questions[index];
  const listItems = document.querySelectorAll(".word");
  
  if (answerIndex === q.correct) {
    listItems[answerIndex].classList.add("correct");
  } else {
    listItems[answerIndex].classList.add("wrong");
    listItems[q.correct].classList.add("correct");
  }

  // Daarna mag de volgende knop pas werken
  document.querySelector("button").disabled = false;
}

// 🌟 Volgende vraag
function nextQuestion() {
  index++;
  document.querySelector("button").disabled = true;
  
  if (index < questions.length) {
    loadQuestion();
  } else {
    alert("🎉 Je hebt alle vragen van dit thema beantwoord!");
    window.location.href = "startmenutaal.html"; // Terug naar main menu
  }
}

// 🌟 Init
loadQuestion();
document.querySelector("button").disabled = true;

</script>

</body>
</html>
