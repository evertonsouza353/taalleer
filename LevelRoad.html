<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fantasy Level Road</title>

<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#1b2330, #0f141d);
  font-family: Arial, sans-serif;
}


/* MAP CONTAINER */

.map {
  width: 420px;
  height: 720px;
  position: relative;

  background-image:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
    url("Photos/achtergrond.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  border-radius: 24px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  overflow: hidden;
}


/* ROAD */

svg {
  position: absolute;
  width: 100%;
  height: 100%;
}

.road {
  fill: none;
  stroke: #cfcfcf;
  stroke-width: 26;
  stroke-linecap: round;

  filter:
    drop-shadow(0 4px 6px rgba(0,0,0,0.6))
    drop-shadow(0 0 6px rgba(255,255,255,0.2));
}


/* LEVEL BUTTONS */

.level {

  position: absolute;

  width: 52px;
  height: 52px;

  border-radius: 50%;

  background: linear-gradient(#ffd76a, #f3a91d);

  display: flex;
  justify-content: center;
  align-items: center;

  font-weight: bold;
  font-size: 18px;

  color: #3d2a00;

  box-shadow:
    0 6px 12px rgba(0,0,0,0.4),
    inset 0 0 6px rgba(255,255,255,0.6);

  border: 3px solid #fff3b0;

  transition: transform .2s ease;

  cursor: pointer;
}


.level:hover {

  transform: scale(1.15);

}


/* COMPLETED LEVELS */

.level.completed {

  background: linear-gradient(#a8ffb0, #2ecc71);

  color: #053d1c;

  border: 3px solid #d5ffe0;

}

</style>
</head>

<body>


<div class="map">


<!-- ROAD PATH -->

<svg viewBox="0 0 420 720">

<path
class="road"

d="

M210 650

C80 600, 340 560, 210 510

C80 460, 340 420, 210 370

C80 320, 340 280, 210 230

C80 180, 340 140, 210 90

"

/>

</svg>



<!-- LEVELS -->

<div class="level completed" style="top:610px; left:185px;" onclick="location.href='level1.html'">1</div>

<div class="level completed" style="top:555px; left:90px;" onclick="location.href='level2.html'">2</div>

<div class="level completed" style="top:510px; left:275px;" onclick="location.href='level3.html'">3</div>

<div class="level completed" style="top:455px; left:90px;" onclick="location.href='level4.html'">4</div>

<div class="level completed" style="top:410px; left:275px;" onclick="location.href='level5.html'">5</div>

<div class="level" style="top:355px; left:90px;" onclick="location.href='level6.html'">6</div>

<div class="level" style="top:310px; left:275px;" onclick="location.href='level7.html'">7</div>

<div class="level" style="top:255px; left:90px;" onclick="location.href='level8.html'">8</div>

<div class="level" style="top:205px; left:275px;" onclick="location.href='level9.html'">9</div>

<div class="level" style="top:145px; left:185px;" onclick="location.href='level10.html'">10</div>


</div>


</body>
</html>
