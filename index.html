<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login of Registreren</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    
    <div class="form-box" id="login-form">
        <form onsubmit="handleLogin(event)">
            <form action="login.php" method="POST">
            <h2>Login Languagelearn</h2>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p>Geen account? 
                <a href="#" onclick="showForm('register-form')">Registreren</a>
            </p>
        </form>
    </div>

    <!-- Register Form -->
    <div class="form-box" id="register-form">
        <form onsubmit="handleRegister(event)">
            <form action="register.php" method="POST">
            <h2>Registreren Languagelearn</h2>
            <input type="text" placeholder="Naam" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <select required>
                <option value="">--Select Role--</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>

            <button type="submit">Registreren</button>
            <p>Heb je al een account? 
                <a href="#" onclick="showForm('login-form')">Login</a>
            </p>
        </form>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
